site_name: chronovista
site_description: Personal YouTube data analytics tool for comprehensive access to your YouTube engagement history
site_author: chronovista Contributors
site_url: https://aucontraire.github.io/chronovista/

repo_name: aucontraire/chronovista
repo_url: https://github.com/aucontraire/chronovista
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.ico

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_cli_ref.py
        - scripts/gen_api_ref.py
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_bases: true
            show_submodules: false
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            line_length: 88
            merge_init_into_class: true
            docstring_section_style: table
            inherited_members: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - def_list
  - abbr
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

# docs/README.md is a folder index for browsing the docs/ directory on GitHub;
# it collides with index.md when built, so exclude it from the site.
exclude_docs: |
  README.md

# Navigation is organized along the Diátaxis framework
# (https://diataxis.fr): Tutorials (learning), How-to guides (tasks),
# Reference (facts — largely generated from source), and Explanation
# (understanding). Contributing and Maintaining are kept as their own
# top-level groups.
nav:
  - Home: index.md
  - Tutorials:
      - Getting Started:
          - Prerequisites: getting-started/prerequisites.md
          - YouTube API Setup: getting-started/youtube-api-setup.md
          - Installation: getting-started/installation.md
          - Quick Start: getting-started/quickstart.md
  - How-to guides:
      - Authenticate: user-guide/authentication.md
      - Populate your data: user-guide/data-population.md
      - Sync your data: user-guide/data-sync.md
      - Import from Google Takeout: user-guide/google-takeout.md
      - Work with transcripts: user-guide/transcripts.md
      - Correct transcripts: user-guide/corrections.md
      - Analyze topics: user-guide/topic-analytics.md
      - CLI workflows: user-guide/cli-overview.md
      - Run the REST API: user-guide/rest-api.md
      - Deploy with Docker: guides/migrating-to-docker.md
      - Troubleshooting: troubleshooting.md
  - Reference:
      - CLI, REST API & Code: reference/
      - REST API guide: api/index.md
      - Error responses (RFC 7807): api/error-responses.md
      - RFC 7807 migration: api/rfc7807-migration.md
      - Configuration: getting-started/configuration.md
      - Glossary: glossary.md
  - Explanation:
      - Architecture overview: architecture/overview.md
      - System design: architecture/system-design.md
      - Data model: architecture/data-model.md
      - API integration: architecture/api-integration.md
      - Frontend architecture: architecture/frontend-architecture.md
  - Contributing:
      - Overview: development/index.md
      - Setup: development/setup.md
      - Testing: development/testing.md
      - Database: development/database.md
      - Frontend Development: development/frontend-development.md
      - Makefile Reference: development/makefile-reference.md
      - Type Checking: development/type-checking.md
      - Code Style: development/code-style.md
      - Documentation: development/documentation.md
      - Contributing Guide: contributing.md
  - Maintaining:
      - Overview: maintaining/index.md
      - Release Process: maintaining/release-process.md
      - Versioning: maintaining/versioning.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aucontraire/chronovista
      name: chronovista on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

