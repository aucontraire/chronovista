[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --verbose
    --asyncio-mode=auto
asyncio_mode = auto
markers =
    db: Tests that require database connection (may be skipped if DB not available)
    integration: Integration tests that require external services or full system setup
    docker: marks tests requiring Docker (deselect with '-m "not docker"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    auth: marks tests requiring OAuth credentials (skipped in CI)
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning:pytest_asyncio*